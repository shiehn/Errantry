name: play-active-scene
description: |
  Vague play ask. The agent must (a) recognize that playback requires an
  active scene with at least one track, (b) find the right transport
  command (`sas transport play` or `sas run dsl_play`), and (c) invoke it.

  `dsl_play` validates "active scene + tracks" before starting — so on a
  truly empty project it errors. The seed below creates a scene + a track
  so the agent's first attempt to play has something to play. The
  scenario therefore tests the *invocation*, not the prerequisite chain.

  Failure modes worth distinguishing in the trace:
    - Agent reaches for a non-existent `sas play` and doesn't pivot to
      `sas transport --help` → friction signal on top-level help.
    - Agent calls `dsl_play` against a project with no active scene and
      gets a generic error → friction signal on `dsl_play` error message.

surface: cli

setup:
  fixture: blank
  preCommands:
    # Seed minimum state for `dsl_play` to succeed: a scene with one track.
    # `dsl_track_create` auto-targets the active scene when none is given.
    - sas scene create Verse --json
    - sas dsl_track_create name=Bass role=bass

agent:
  provider: openai
  model: gpt-4o-mini
  max_turns: 8
  system: |
    You are testing a CLI named `sas`. The `sas` binary is on PATH.
    Use it to accomplish the goal. Discover the surface via `sas --help`,
    `sas <subcommand> --help`, or `sas list-actions`. Read error messages
    carefully and use them to recover. Run one bash command per tool call.
    When the goal is satisfied, respond without calling a tool.

goal: |
  Play it.

metadata:
  exercises:
    - dsl_play

assertions:
  - toolCalled:
      contains: "play"
  - budget:
      turns: 8
      errors: 4
      frictionScore: 0.5
