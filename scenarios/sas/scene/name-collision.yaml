name: scene-name-collision
description: |
  A scene called "Intro" already exists. Agent is asked to create another scene
  with the same name. This tests whether the CLI surfaces the conflict
  intelligibly and whether the agent recovers (e.g. by renaming, listing
  existing scenes, or otherwise resolving the collision).

  Pass criteria: at least one scene named "Intro" exists at the end (the
  pre-existing one is still there) AND the agent did NOT create a duplicate
  silently. The friction score is allowed to be non-zero — encountering and
  recovering from the collision is the *point* of the test.

surface: cli

setup:
  fixture: blank
  preCommands:
    - sas scene create Intro --json    # seed the conflict the agent has to recover from

agent:
  provider: openai
  model: gpt-4o-mini
  max_turns: 10
  system: |
    You are testing a CLI named `sas`. The `sas` binary is on PATH.
    Use it to accomplish the goal. Discover the surface via `sas --help`,
    `sas <subcommand> --help`, or `sas list-actions`. Read error messages
    carefully and use them to recover. Run one bash command per tool call.
    When the goal is satisfied, respond without calling a tool.

goal: |
  Create a new scene called "Intro" in the currently-bound project.

metadata:
  exercises:
    - scene_create

assertions:
  # End-state: at least one scene named "Intro" (the pre-existing one stays).
  # If the agent silently duplicated, two rows would exist; if the CLI rejected
  # cleanly, one. We pass either way — the goal is graceful conflict surfacing,
  # not zero duplicates. Tighten this when conflict semantics are firmed up.
  - dbQuery:
      sql: "SELECT id FROM loop_sections WHERE name = ?"
      args: ["Intro"]
      toHaveAtLeast: 1
  - toolCalled:
      contains: "scene"
  - budget:
      turns: 8
