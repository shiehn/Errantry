name: scene-missing-required-arg
description: |
  This scenario tests how well the CLI's error message guides an agent that
  invokes `sas scene create` without a name. Commander's default missing-
  argument error is terse; the test verifies the agent reads it, infers the
  fix, and supplies a name on the next attempt.

  This is the canonical "is your CLI self-teaching" test — a strong pass means
  errors carry enough signal to recover; a fail means the agent gives up or
  flounders.

surface: cli

setup:
  fixture: blank

agent:
  provider: openai
  model: gpt-4o-mini
  max_turns: 12
  system: |
    You are testing a CLI named `sas`. The `sas` binary is on PATH.
    Use it to accomplish the goal. Discover the surface via `sas --help`,
    `sas <subcommand> --help`, or `sas list-actions`. Read error messages
    carefully and use them to recover. Run one bash command per tool call.
    When the goal is satisfied, respond without calling a tool.

goal: |
  Create a new scene. The user did not specify a name — pick a sensible default
  like "Untitled Scene" if the CLI requires one.

metadata:
  exercises:
    - scene_create

assertions:
  - dbQuery:
      sql: "SELECT id FROM loop_sections"
      toHaveAtLeast: 2          # blank fixture seeds one scene; agent must add a second
  - toolCalled:
      contains: "scene"
  - budget:
      turns: 10
