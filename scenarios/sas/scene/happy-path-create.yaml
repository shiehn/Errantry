name: happy-path-create-scene
description: |
  Baseline scenario. Agent has never used `sas` before and must create a scene
  called "Verse". Tests whether the CLI's --help and command organization are
  enough for the agent to find `sas scene create` without external docs.

surface: cli

setup:
  fixture: blank          # programmatic empty project — no .sasproj file needed

agent:
  provider: openai
  model: gpt-4o-mini
  max_turns: 8
  system: |
    You are testing a CLI named `sas`. The `sas` binary is on PATH.
    Use it to accomplish the goal. Discover the surface via `sas --help`,
    `sas <subcommand> --help`, or `sas list-actions`. Read error messages
    carefully and use them to recover. Run one bash command per tool call.
    When the goal is satisfied, respond without calling a tool.

goal: |
  Create a new scene called "Verse" in the currently-bound project.

assertions:
  - dbQuery:
      sql: "SELECT name FROM loop_sections WHERE name = ?"
      args: ["Verse"]
      toHaveAtLeast: 1
  - toolCalled:
      contains: "scene"
  - helpInvoked: null
  - budget:
      turns: 6
      errors: 2
      frictionScore: 0.5
