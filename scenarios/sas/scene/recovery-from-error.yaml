name: scene-recovery-from-error
description: |
  The agent is given a goal that almost certainly involves making at least
  one wrong call (e.g. wrong subcommand, wrong flag, missing arg). The
  scenario passes only if:
    1. The agent encountered at least one error (proving the test bit)
    2. The agent recovered (subsequent successful invocation)
    3. The final state matches the goal

  This is the canonical "do your error messages teach the agent" test —
  if a strong agent never errors, you can't measure error legibility.

surface: cli

setup:
  fixture: blank

agent:
  provider: openai
  model: gpt-4o-mini
  max_turns: 12
  system: |
    You are testing a CLI named `sas`. The binary is on PATH.

    IMPORTANT: Try the most natural-sounding command FIRST without consulting
    --help. Only fall back to --help / list-actions after a command fails.
    We are testing whether the CLI's error messages are intelligible enough
    to recover.

goal: |
  Set the project tempo to 128 BPM.

metadata:
  exercises:
    - dsl_set_tempo

assertions:
  # Tempo is engine-side; projects.tempo is a DB cache that can lag. Assert
  # via toolCalled so we don't depend on the eventual sync.
  - toolCalled:
      contains: "128"
  - errorRecovered: null
  - budget:
      turns: 10
